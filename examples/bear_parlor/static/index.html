<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BEAR Parlor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: row;
  }
  .main-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  /* ---- Header ---- */
  header {
    background: #16213e;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #0f3460;
    flex-shrink: 0;
  }
  header h1 { font-size: 1.15rem; font-weight: 600; color: #e0e0e0; }
  header h1 span { color: #e8a735; font-weight: 700; }
  .header-controls { display: flex; gap: 10px; align-items: center; }
  .tts-toggle {
    background: #0f3460; border: 1px solid #1a4b8c; color: #aaa;
    padding: 5px 14px; border-radius: 16px; cursor: pointer;
    font-size: 0.78rem; transition: all 0.2s;
  }
  .tts-toggle.active { background: #1a6b3e; border-color: #2a8b5e; color: #e0e0e0; }
  .tts-toggle.active.static-warn { background: #8b4513; border-color: #b8651a; }
  .badge {
    font-size: 0.68rem; color: #888; padding: 3px 10px;
    background: #0f3460; border-radius: 10px;
  }

  /* ---- Stage: visual room layout ---- */
  .stage {
    background: #141428;
    border-bottom: 1px solid #0f3460;
    padding: 18px 20px 12px;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }
  .stage-svg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 2;
  }
  .stage-row {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 32px;
    position: relative;
    z-index: 3;
  }
  .stage-divider {
    width: 1px;
    height: 56px;
    background: #2a2a4e;
    align-self: center;
    margin: 0 8px;
  }
  .stage-char {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    transition: transform 0.2s;
    position: relative;
  }
  .stage-char:hover { transform: translateY(-2px); }
  .stage-avatar {
    width: 52px; height: 52px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem; font-weight: 700; color: #fff;
    border: 3px solid transparent;
    transition: all 0.3s;
    position: relative;
  }
  .stage-name {
    font-size: 0.72rem; color: #777;
    transition: color 0.3s;
  }

  /* Speaking state: glow ring */
  .stage-char.speaking .stage-avatar {
    border-color: var(--char-color);
    box-shadow: 0 0 16px var(--char-color), 0 0 4px var(--char-color);
  }
  .stage-char.speaking .stage-name { color: #ccc; }

  /* Addressed state: dashed ring */
  .stage-char.addressed .stage-avatar {
    border-color: rgba(255,255,255,0.35);
    border-style: dashed;
  }

  /* Typing state: pulsing dots below name */
  .stage-char.typing::after {
    content: '\2022  \2022  \2022';
    position: absolute;
    bottom: -14px;
    font-size: 0.7rem;
    color: #999;
    letter-spacing: 1px;
    animation: stagePulse 1.2s infinite;
  }
  @keyframes stagePulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }

  /* PDF drop zones */
  .stage-char.drop-target .stage-avatar {
    border: 2px dashed rgba(255,255,255,0.7) !important;
    box-shadow: 0 0 14px rgba(255,255,255,0.25);
  }
  .stage-char.ingesting .stage-avatar {
    opacity: 0.55;
    animation: stagePulse 0.7s infinite;
  }

  /* Stage status bar */
  .stage-status {
    text-align: center;
    font-size: 0.75rem;
    color: #555;
    margin-top: 10px;
    min-height: 16px;
    transition: opacity 0.3s;
  }

  /* ---- LLM config gear & popup ---- */
  .stage-gear {
    position: absolute;
    top: -2px; right: -6px;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: #2a2a4e;
    border: 1px solid #444;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.6rem;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 10;
    color: #aaa;
  }
  .stage-char:hover .stage-gear { opacity: 1; }
  .stage-gear:hover { background: #3a3a6e; color: #e0e0e0; }

  .llm-popup {
    position: fixed;
    z-index: 1000;
    background: #1e1e3a;
    border: 1px solid #444;
    border-radius: 10px;
    padding: 14px 16px;
    width: 280px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    animation: fadeIn 0.15s ease;
  }
  .llm-popup h3 {
    font-size: 0.82rem;
    font-weight: 600;
    margin-bottom: 10px;
    color: #e8a735;
  }
  .llm-popup label {
    font-size: 0.72rem;
    color: #999;
    display: block;
    margin-bottom: 3px;
    margin-top: 8px;
  }
  .llm-popup select, .llm-popup input {
    width: 100%;
    padding: 6px 8px;
    background: #141428;
    border: 1px solid #333;
    border-radius: 6px;
    color: #e0e0e0;
    font-size: 0.78rem;
    font-family: inherit;
  }
  .llm-popup select:focus, .llm-popup input:focus {
    outline: none;
    border-color: #e8a735;
  }
  .llm-popup .llm-default-note {
    font-size: 0.68rem;
    color: #666;
    margin-top: 2px;
  }
  .llm-popup .llm-popup-actions {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }
  .llm-popup button {
    flex: 1;
    padding: 5px 10px;
    border-radius: 6px;
    border: 1px solid #444;
    background: #0f3460;
    color: #e0e0e0;
    font-size: 0.75rem;
    cursor: pointer;
    transition: background 0.15s;
  }
  .llm-popup button:hover { background: #1a4b8c; }
  .llm-popup button.llm-apply { background: #1a6b3e; border-color: #2a8b5e; }
  .llm-popup button.llm-apply:hover { background: #238b52; }
  .llm-popup button.llm-reset { background: #5a2020; border-color: #8b3030; }
  .llm-popup button.llm-reset:hover { background: #7a3030; }

  .stage-char .llm-badge {
    font-size: 0.58rem;
    color: #888;
    margin-top: -2px;
    max-width: 80px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    text-align: center;
  }

  .llm-popup-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 999;
  }

  /* ---- Chat area ---- */
  .chat-log {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    scroll-behavior: smooth;
  }

  /* ---- Message bubble ---- */
  .message {
    display: flex;
    gap: 10px;
    margin-bottom: 12px;
    animation: fadeIn 0.3s ease;
    max-width: 85%;
  }
  .message.user-msg {
    margin-left: auto;
    flex-direction: row-reverse;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.68rem; font-weight: 700; color: #fff;
    flex-shrink: 0; margin-top: 2px;
  }

  .msg-body { flex: 1; min-width: 0; }

  .msg-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 3px;
  }
  .message.user-msg .msg-header { flex-direction: row-reverse; }

  .msg-name { font-size: 0.78rem; font-weight: 600; }
  .msg-target {
    font-size: 0.65rem;
    padding: 1px 8px;
    border-radius: 8px;
    background: rgba(255,255,255,0.07);
    color: #999;
    white-space: nowrap;
  }

  .msg-bubble {
    padding: 9px 14px;
    border-radius: 16px;
    font-size: 0.88rem;
    line-height: 1.45;
    color: #d4d4d4;
    word-wrap: break-word;
    position: relative;
    border: 1px solid rgba(255,255,255,0.06);
  }
  /* Character bubbles */
  .message:not(.user-msg) .msg-bubble {
    background: #1e1e38;
    border-left: 3px solid var(--char-color, #555);
    border-top-left-radius: 4px;
  }
  /* User bubbles */
  .message.user-msg .msg-bubble {
    background: #252548;
    border-right: 3px solid #888;
    border-top-right-radius: 4px;
  }
  .message.user-msg .msg-body { text-align: right; }

  .msg-bubble .action {
    color: #888;
    font-style: italic;
  }

  /* ---- Typing indicator ---- */
  .typing-indicator {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 0; margin-bottom: 8px;
    font-size: 0.78rem; color: #666;
    animation: fadeIn 0.2s ease;
  }
  .typing-dots { display: flex; gap: 3px; }
  .typing-dots span {
    width: 5px; height: 5px; background: #555;
    border-radius: 50%; animation: typingBounce 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-3px); }
  }

  /* ---- Input bar ---- */
  .input-bar {
    padding: 10px 20px;
    background: #16213e;
    border-top: 1px solid #0f3460;
    display: flex; gap: 10px; flex-shrink: 0;
  }
  .input-bar input {
    flex: 1; background: #1a1a2e; border: 1px solid #2a2a4e;
    color: #e0e0e0; padding: 10px 16px; border-radius: 20px;
    font-size: 0.88rem; outline: none; transition: border-color 0.2s;
  }
  .input-bar input:focus { border-color: #4a4a8e; }
  .input-bar input::placeholder { color: #555; }
  .input-bar button {
    background: #e8a735; border: none; color: #1a1a2e;
    padding: 10px 20px; border-radius: 20px; font-weight: 600;
    cursor: pointer; font-size: 0.84rem; transition: background 0.2s;
  }
  .input-bar button:hover { background: #f0b84a; }
  .input-bar button:disabled { background: #555; cursor: default; }

  /* ---- Welcome ---- */
  .welcome {
    text-align: center; padding: 40px 20px; color: #555;
  }
  .welcome h2 { font-size: 1.05rem; color: #888; margin-bottom: 8px; }
  .welcome p {
    font-size: 0.82rem; max-width: 400px;
    margin: 0 auto; line-height: 1.5;
  }

  /* ---- Insight Panel ---- */
  .insight-panel {
    width: 360px;
    background: #141428;
    border-left: 1px solid #0f3460;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    transition: width 0.25s, opacity 0.25s;
    overflow: hidden;
  }
  .insight-panel.collapsed {
    width: 0;
    opacity: 0;
    border-left: none;
  }
  .insight-header {
    display: flex;
    align-items: center;
    padding: 10px 14px;
    border-bottom: 1px solid #0f3460;
    gap: 4px;
    flex-shrink: 0;
  }
  .insight-tab {
    background: none; border: none; color: #666;
    padding: 5px 14px; border-radius: 12px;
    font-size: 0.75rem; cursor: pointer;
    transition: all 0.2s;
  }
  .insight-tab.active {
    background: #1a3060; color: #bbb;
  }
  .insight-body {
    flex: 1;
    overflow-y: auto;
    padding: 10px 12px;
  }
  .insight-empty {
    text-align: center;
    color: #444;
    font-size: 0.78rem;
    padding: 30px 10px;
    line-height: 1.5;
  }
  .insight-char-label {
    font-size: 0.72rem;
    color: #888;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .insight-char-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
  }

  /* Instruction card */
  .instr-card {
    background: #1a1a36;
    border: 1px solid #252548;
    border-radius: 8px;
    padding: 9px 11px;
    margin-bottom: 8px;
    font-size: 0.75rem;
    animation: fadeIn 0.2s ease;
  }
  .instr-card-top {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 5px;
  }
  .instr-type-badge {
    font-size: 0.62rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 2px 7px;
    border-radius: 6px;
    color: #fff;
    flex-shrink: 0;
  }
  .instr-type-badge.constraint  { background: #8b2040; }
  .instr-type-badge.persona     { background: #2a5090; }
  .instr-type-badge.protocol    { background: #1a6b3e; }
  .instr-type-badge.directive   { background: #8b6520; }
  .instr-type-badge.fallback    { background: #444; }
  .instr-id {
    color: #555;
    font-size: 0.65rem;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .instr-score {
    color: #aaa;
    font-size: 0.68rem;
    font-weight: 600;
    flex-shrink: 0;
  }
  .instr-bar-wrap {
    height: 4px;
    background: #252548;
    border-radius: 2px;
    margin-bottom: 5px;
    overflow: hidden;
  }
  .instr-bar {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s ease;
  }
  .instr-content {
    color: #777;
    font-size: 0.7rem;
    line-height: 1.4;
    margin-bottom: 4px;
  }
  .instr-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .instr-tag {
    font-size: 0.6rem;
    padding: 1px 6px;
    border-radius: 6px;
    background: #252548;
    color: #888;
  }

  /* ---- Editor view ---- */
  .editor-list .instr-card { cursor: pointer; transition: border-color 0.2s; }
  .editor-list .instr-card:hover { border-color: #3a3a6e; }
  .editor-back {
    background: none; border: none; color: #888;
    font-size: 0.75rem; cursor: pointer; padding: 4px 0;
    margin-bottom: 8px;
    transition: color 0.2s;
  }
  .editor-back:hover { color: #bbb; }
  .editor-field { margin-bottom: 10px; }
  .editor-field label {
    display: block;
    font-size: 0.68rem;
    color: #666;
    margin-bottom: 3px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .editor-field input,
  .editor-field textarea {
    width: 100%;
    background: #1a1a2e;
    border: 1px solid #2a2a4e;
    color: #ccc;
    border-radius: 6px;
    padding: 7px 10px;
    font-size: 0.78rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  .editor-field input:focus,
  .editor-field textarea:focus { border-color: #4a4a8e; }
  .editor-field textarea {
    resize: vertical;
    min-height: 100px;
    line-height: 1.45;
  }
  .editor-save {
    background: #1a6b3e; border: none; color: #e0e0e0;
    padding: 6px 18px; border-radius: 12px; font-size: 0.75rem;
    font-weight: 600; cursor: pointer; transition: background 0.2s;
  }
  .editor-save:hover { background: #228b4e; }
  .editor-save:disabled { background: #333; color: #666; cursor: default; }
  .editor-status {
    font-size: 0.7rem;
    margin-left: 10px;
    color: #4caf50;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .editor-status.error { color: #e05555; }

  /* ---- Toast notifications ---- */
  .toast-container {
    position: fixed;
    bottom: 16px;
    right: 16px;
    z-index: 100;
    display: flex;
    flex-direction: column-reverse;
    gap: 8px;
    pointer-events: none;
    max-width: 320px;
  }
  .toast {
    background: #1e1e38;
    border: 1px solid #2a2a4e;
    border-left: 3px solid #e8a735;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 0.75rem;
    color: #ccc;
    pointer-events: auto;
    animation: toastIn 0.3s ease, toastOut 0.4s ease 4.6s forwards;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  }
  @keyframes toastIn {
    from { opacity: 0; transform: translateY(12px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes toastOut {
    from { opacity: 1; }
    to { opacity: 0; transform: translateY(-8px); }
  }
  .toast-title {
    font-weight: 700;
    color: #e8a735;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .toast-pair {
    margin-bottom: 4px;
    line-height: 1.5;
  }
  .toast-pair .name { font-weight: 600; }
  .toast-arrow-up { color: #4caf50; }
  .toast-arrow-down { color: #e05555; }
  .toast-old { color: #555; font-size: 0.65rem; }
  .toast-evolution .toast-title { color: #9be8a7; }
  .insight-context-tags {
    font-size: 0.65rem;
    color: #888;
    margin-bottom: 8px;
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
    align-items: center;
  }
  .ctx-tag { background: #1a2a3a; color: #7ab8e8; border-color: #2a4a6a; }
  .toast-evolution { border-color: #3a5a3e; }
  .toast-relationship {
    color: #888;
    font-size: 0.68rem;
    font-style: italic;
    margin-top: 4px;
    border-top: 1px solid #252548;
    padding-top: 4px;
  }

  /* ---- Responsive ---- */
  @media (max-width: 900px) {
    .insight-panel { width: 280px; }
  }
  @media (max-width: 600px) {
    body { flex-direction: column; }
    .insight-panel { width: 100%; height: 240px; border-left: none; border-top: 1px solid #0f3460; }
    .insight-panel.collapsed { width: 100%; height: 0; }
    .stage-row { gap: 16px; }
    .stage-avatar { width: 42px; height: 42px; font-size: 0.72rem; }
    .stage-name { font-size: 0.65rem; }
    .stage-divider { height: 42px; }
    .message { max-width: 95%; }
  }
</style>
</head>
<body>

<div class="main-area">

<header>
  <h1><span>BEAR</span> Parlor</h1>
  <div class="header-controls">
    <button class="tts-toggle" id="tts-btn" onclick="toggleTTS()">TTS: OFF</button>
    <button class="tts-toggle" id="static-btn" onclick="toggleStaticMode()">Static Prompt</button>
    <button class="tts-toggle active" id="insight-btn" onclick="toggleInsight()">BEAR Insight</button>
    <span class="badge">Behavioral RAG Demo</span>
  </div>
</header>

<!-- Stage: visual room with character avatars and direction arrows -->
<div class="stage" id="stage">
  <svg class="stage-svg" id="stage-svg">
    <defs>
      <marker id="arrowhead" markerWidth="8" markerHeight="6"
              refX="7" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#e8a735" opacity="0.8"/>
      </marker>
    </defs>
  </svg>
  <div class="stage-row" id="stage-row">
    <!-- Populated by JS -->
  </div>
  <div class="stage-status" id="stage-status"></div>
</div>

<!-- Chat log -->
<div class="chat-log" id="chat-log">
  <div class="welcome">
    <h2>BEAR Parlor</h2>
    <p>Six Thinking Hats deliberation panel. Pose a topic or let the session script run.</p>
  </div>
</div>

<!-- Input -->
<div class="input-bar">
  <input type="text" id="chat-input" placeholder="Say something..."
         onkeydown="if(event.key==='Enter')sendChat()" autocomplete="off">
  <button onclick="sendChat()">Send</button>
</div>

</div><!-- /.main-area -->

<!-- BEAR Insight Panel -->
<div class="insight-panel" id="insight-panel">
  <div class="insight-header">
    <button class="insight-tab active" id="tab-retrieved" onclick="switchInsightTab('retrieved')">Retrieved</button>
    <button class="insight-tab" id="tab-editor" onclick="switchInsightTab('editor')">Editor</button>
  </div>
  <div class="insight-body" id="insight-body">
    <div class="insight-empty">
      Waiting for character response&hellip;<br>
      BEAR instructions will appear here.
    </div>
  </div>
</div>

<!-- Toast notifications for affinity shifts -->
<div class="toast-container" id="toast-container"></div>

<script>
// ====================================================================
// State
// ====================================================================
let ws = null;
let characters = {};
let ttsEnabled = false;
let autoScroll = true;
let typingTimers = {};
let stageTimeout = null;
let currentAudio = null;  // tracks the actively playing Audio object
let insightOpen = true;
let insightTab = 'retrieved';  // 'retrieved' or 'editor'
let lastBearInstructions = null;
let lastBearContextTags = [];
let lastBearKnowledge = [];
let lastBearCharacter = null;
let allInstructions = [];     // full instruction list for editor
let editingInstruction = null; // instruction being edited (or null for list view)
let staticMode = false;
let defaultLLM = { backend: '', model: '' };
let availableBackends = [];

const chatLog   = document.getElementById('chat-log');
const chatInput = document.getElementById('chat-input');
const ttsBtn    = document.getElementById('tts-btn');
const stageRow  = document.getElementById('stage-row');
const stageSvg  = document.getElementById('stage-svg');
const stageStatus = document.getElementById('stage-status');
const insightPanel = document.getElementById('insight-panel');
const insightBody  = document.getElementById('insight-body');
const insightBtn   = document.getElementById('insight-btn');
const toastContainer = document.getElementById('toast-container');

chatLog.addEventListener('scroll', () => {
  autoScroll = chatLog.scrollHeight - chatLog.scrollTop - chatLog.clientHeight < 60;
});

// ====================================================================
// WebSocket
// ====================================================================
function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws`);
  ws.onopen = () => console.log('Connected to BEAR Parlor');
  ws.onclose = () => { console.log('Disconnected. Reconnecting...'); setTimeout(connect, 3000); };
  ws.onmessage = (e) => handleMessage(JSON.parse(e.data));
}

function handleMessage(msg) {
  switch (msg.type) {
    case 'init':
      characters = msg.characters;
      ttsEnabled = msg.tts_enabled;
      staticMode = msg.static_mode || false;
      defaultLLM = msg.default_llm || { backend: '', model: '' };
      availableBackends = msg.available_backends || [];
      updateTTSButton();
      updateStaticButton();
      renderStage();
      if (msg.panel_name) {
        const w = chatLog.querySelector('.welcome');
        if (w) {
          w.querySelector('h2').textContent = msg.panel_name;
          if (msg.panel_description) w.querySelector('p').textContent = msg.panel_description;
        }
        document.title = msg.panel_name + ' — BEAR Parlor';
      }
      if (msg.history && msg.history.length > 0) {
        const w = chatLog.querySelector('.welcome');
        if (w) w.remove();
        msg.history.forEach(m => appendMessage(m, false));
      }
      break;

    case 'message': {
      const w = chatLog.querySelector('.welcome');
      if (w) w.remove();
      removeTyping(msg.sender);
      appendMessage(msg, true);
      updateStage(msg.sender, msg.addressed_to, msg.color);
      if (msg.audio && ttsEnabled) playAudio(msg.audio, msg.audio_seq);
      // Update insight panel with BEAR instructions
      if (msg.sender !== 'user') {
        const bi = msg.bear_instructions;
        if (bi && bi.instructions) {
          lastBearInstructions = bi.instructions;
          lastBearContextTags = bi.context_tags || [];
          lastBearKnowledge = bi.knowledge || [];
        } else {
          lastBearInstructions = bi || null;
          lastBearContextTags = [];
          lastBearKnowledge = [];
        }
        lastBearCharacter = msg.sender;
        if (insightTab === 'retrieved') renderRetrievedPanel();
      }
      break;
    }

    case 'typing':
      showTyping(msg.character);
      setStageTyping(msg.character, true);
      break;

    case 'typing_done':
      removeTyping(msg.character);
      setStageTyping(msg.character, false);
      break;

    case 'tts_state':
      ttsEnabled = msg.enabled;
      updateTTSButton();
      break;

    case 'affinity_update':
      if (msg.changes) msg.changes.forEach(showAffinityToast);
      break;

    case 'evolution':
      showEvolutionToast(msg);
      break;

    case 'ingest_complete':
      showToast(
        `${msg.hat_name} received "${msg.source}" — ${msg.count} knowledge chunks indexed`,
        '#40a840'
      );
      break;

    case 'instructions_list':
      allInstructions = msg.instructions || [];
      if (insightTab === 'editor') renderEditorList();
      break;

    case 'instruction_updated':
      handleInstructionUpdated(msg);
      break;

    case 'static_mode':
      staticMode = msg.enabled;
      updateStaticButton();
      // Re-render insight panel to show bypass warning if needed
      if (insightTab === 'retrieved') renderRetrievedPanel();
      break;

    case 'character_llm_updated':
      if (msg.success && msg.llm_assignments) {
        for (const [cid, info] of Object.entries(msg.llm_assignments)) {
          if (characters[cid]) {
            characters[cid].llm_backend = info.backend;
            characters[cid].llm_model = info.model;
          }
        }
        updateLLMBadges();
        const cn = characters[msg.character_id]?.short_name || msg.character_id;
        const info = msg.llm_assignments[msg.character_id];
        const label = info.backend ? `${info.backend}/${info.model || 'default'}` : 'session default';
        showToast(`${cn} LLM → ${label}`, '#4080c0');
      } else if (!msg.success) {
        showToast(`LLM update failed: ${msg.error}`, '#e84040');
      }
      break;
  }
}

// ====================================================================
// Stage rendering
// ====================================================================
function renderStage() {
  stageRow.innerHTML = '';

  // Character avatars
  for (const [cid, char] of Object.entries(characters)) {
    const el = document.createElement('div');
    el.className = 'stage-char';
    el.dataset.id = cid;
    el.style.setProperty('--char-color', char.color);
    el.title = char.description;
    el.onclick = () => pokeCharacter(cid);
    el.addEventListener('dragover', e => {
      if (e.dataTransfer.types.includes('Files')) {
        e.preventDefault();
        el.classList.add('drop-target');
      }
    });
    el.addEventListener('dragleave', e => {
      if (!el.contains(e.relatedTarget)) el.classList.remove('drop-target');
    });
    el.addEventListener('drop', e => {
      e.preventDefault();
      el.classList.remove('drop-target');
      const file = e.dataTransfer.files[0];
      if (!file || !file.name.toLowerCase().endsWith('.pdf')) {
        showToast('Drop a PDF file to ingest knowledge', '#e84040');
        return;
      }
      ingestPDF(cid, file, el);
    });
    const llmLabel = char.llm_backend
      ? `${char.llm_backend}/${char.llm_model || 'default'}`
      : '';
    el.innerHTML = `
      <div class="stage-avatar" style="background:${char.color}">
        ${esc(char.avatar)}
        <div class="stage-gear" onclick="event.stopPropagation(); openLLMPopup('${cid}', this)" title="Configure LLM">&#9881;</div>
      </div>
      <div class="stage-name">${esc(char.short_name)}</div>
      <div class="llm-badge">${esc(llmLabel)}</div>
    `;
    stageRow.appendChild(el);
  }

  // Divider
  const divider = document.createElement('div');
  divider.className = 'stage-divider';
  stageRow.appendChild(divider);

  // Player avatar
  const player = document.createElement('div');
  player.className = 'stage-char';
  player.dataset.id = 'user';
  player.style.setProperty('--char-color', '#999');
  player.innerHTML = `
    <div class="stage-avatar" style="background:#555">You</div>
    <div class="stage-name">Visitor</div>
  `;
  stageRow.appendChild(player);
}

function updateStage(senderId, addressedTo, senderColor) {
  // Clear previous states
  document.querySelectorAll('.stage-char').forEach(el => {
    el.classList.remove('speaking', 'addressed');
  });
  clearArrow();

  // Speaking character
  const speakerEl = document.querySelector(`.stage-char[data-id="${senderId}"]`);
  if (speakerEl) speakerEl.classList.add('speaking');

  // Addressed character
  if (addressedTo) {
    const addrEl = document.querySelector(`.stage-char[data-id="${addressedTo}"]`);
    if (addrEl) addrEl.classList.add('addressed');
    drawArrow(senderId, addressedTo, senderColor || '#e8a735');
  }

  // Status text
  const sName = senderName(senderId);
  if (addressedTo) {
    const aName = senderName(addressedTo);
    stageStatus.textContent = `${sName} is talking to ${aName}`;
  } else {
    stageStatus.textContent = `${sName} is talking`;
  }
  stageStatus.style.opacity = '1';

  // Auto-clear after 8s
  clearTimeout(stageTimeout);
  stageTimeout = setTimeout(() => {
    document.querySelectorAll('.stage-char').forEach(el =>
      el.classList.remove('speaking', 'addressed'));
    clearArrow();
    stageStatus.style.opacity = '0';
  }, 8000);
}

function setStageTyping(charId, on) {
  const el = document.querySelector(`.stage-char[data-id="${charId}"]`);
  if (el) el.classList.toggle('typing', on);
}

function senderName(id) {
  if (id === 'user') return 'Visitor';
  return characters[id] ? characters[id].short_name : id;
}

// ====================================================================
// Stage arrow (SVG)
// ====================================================================
function clearArrow() {
  // Remove all children except <defs>
  const defs = stageSvg.querySelector('defs');
  stageSvg.innerHTML = '';
  if (defs) stageSvg.appendChild(defs);
}

function drawArrow(fromId, toId, color) {
  clearArrow();

  const fromAvatar = document.querySelector(`.stage-char[data-id="${fromId}"] .stage-avatar`);
  const toAvatar   = document.querySelector(`.stage-char[data-id="${toId}"] .stage-avatar`);
  if (!fromAvatar || !toAvatar) return;

  const stageRect = document.getElementById('stage').getBoundingClientRect();
  const fR = fromAvatar.getBoundingClientRect();
  const tR = toAvatar.getBoundingClientRect();

  const x1 = fR.left + fR.width / 2 - stageRect.left;
  const y1 = fR.top + fR.height - stageRect.top + 2;
  const x2 = tR.left + tR.width / 2 - stageRect.left;
  const y2 = tR.top + tR.height - stageRect.top + 2;

  // Quadratic bezier — arc below the avatars
  const cx = (x1 + x2) / 2;
  const cy = Math.max(y1, y2) + 18;

  const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  path.setAttribute('d', `M ${x1} ${y1} Q ${cx} ${cy} ${x2} ${y2}`);
  path.setAttribute('stroke', color);
  path.setAttribute('stroke-width', '2');
  path.setAttribute('fill', 'none');
  path.setAttribute('opacity', '0.5');
  path.setAttribute('marker-end', 'url(#arrowhead)');

  // Animate draw-in
  const len = estimatePathLength(x1, y1, cx, cy, x2, y2);
  path.setAttribute('stroke-dasharray', len);
  path.setAttribute('stroke-dashoffset', len);
  stageSvg.appendChild(path);

  requestAnimationFrame(() => {
    path.style.transition = 'stroke-dashoffset 0.35s ease';
    path.setAttribute('stroke-dashoffset', '0');
  });
}

function estimatePathLength(x1, y1, cx, cy, x2, y2) {
  // Rough bezier arc length estimate
  const chord = Math.hypot(x2 - x1, y2 - y1);
  const ctrl  = Math.hypot(cx - x1, cy - y1) + Math.hypot(x2 - cx, y2 - cy);
  return (chord + ctrl) / 2;
}

// Redraw arrow on resize
let resizeRAF = null;
window.addEventListener('resize', () => {
  if (resizeRAF) cancelAnimationFrame(resizeRAF);
  resizeRAF = requestAnimationFrame(() => {
    const speakerEl = document.querySelector('.stage-char.speaking');
    const addrEl = document.querySelector('.stage-char.addressed');
    if (speakerEl && addrEl) {
      drawArrow(speakerEl.dataset.id, addrEl.dataset.id,
        speakerEl.style.getPropertyValue('--char-color') || '#e8a735');
    }
  });
});

// ====================================================================
// Chat rendering
// ====================================================================
function appendMessage(msg, animate) {
  const div = document.createElement('div');
  const isUser = msg.sender === 'user';
  div.className = 'message' + (isUser ? ' user-msg' : '');
  if (!animate) div.style.animation = 'none';

  const color  = msg.color || '#666';
  const avatar = msg.avatar || (isUser ? 'You' : '?');
  const name   = msg.sender_name || msg.sender;

  // Direction badge
  let targetBadge = '';
  if (msg.addressed_name) {
    targetBadge = `<span class="msg-target">\u2192 ${esc(msg.addressed_name)}</span>`;
  }

  // Format *actions*
  const text = (msg.content || '').replace(
    /\*([^*]+)\*/g, '<span class="action">*$1*</span>'
  );

  div.style.setProperty('--char-color', color);
  div.innerHTML = `
    <div class="msg-avatar" style="background:${color}">${esc(avatar)}</div>
    <div class="msg-body">
      <div class="msg-header">
        <span class="msg-name" style="color:${color}">${esc(name)}</span>
        ${targetBadge}
      </div>
      <div class="msg-bubble">${text}</div>
    </div>
  `;

  chatLog.appendChild(div);
  if (autoScroll) chatLog.scrollTop = chatLog.scrollHeight;
}

function showTyping(charId) {
  if (document.getElementById('typing-' + charId)) return;
  const char = characters[charId];
  if (!char) return;

  const div = document.createElement('div');
  div.className = 'typing-indicator';
  div.id = 'typing-' + charId;
  div.innerHTML = `
    <span style="color:${char.color}">${esc(char.short_name)}</span> is thinking
    <div class="typing-dots"><span></span><span></span><span></span></div>
  `;
  chatLog.appendChild(div);
  if (autoScroll) chatLog.scrollTop = chatLog.scrollHeight;
  typingTimers[charId] = setTimeout(() => removeTyping(charId), 30000);
}

function removeTyping(charId) {
  const el = document.getElementById('typing-' + charId);
  if (el) el.remove();
  if (typingTimers[charId]) { clearTimeout(typingTimers[charId]); delete typingTimers[charId]; }
}

// ====================================================================
// Actions
// ====================================================================
function sendChat() {
  const text = chatInput.value.trim();
  if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type: 'chat', content: text }));
  chatInput.value = '';
  chatInput.focus();
}

function toggleTTS() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type: 'tts_toggle', enabled: !ttsEnabled }));
}

function updateTTSButton() {
  ttsBtn.textContent = ttsEnabled ? 'TTS: ON' : 'TTS: OFF';
  ttsBtn.classList.toggle('active', ttsEnabled);
}

function toggleStaticMode() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type: 'toggle_static_mode' }));
}

function updateStaticButton() {
  const btn = document.getElementById('static-btn');
  btn.classList.toggle('active', staticMode);
  btn.classList.toggle('static-warn', staticMode);
  btn.textContent = staticMode ? 'Static: ON' : 'Static Prompt';
}

function pokeCharacter(charId) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type: 'poke', character: charId }));
}

function closeLLMPopup() {
  const existing = document.querySelector('.llm-popup');
  if (existing) existing.remove();
  const overlay = document.querySelector('.llm-popup-overlay');
  if (overlay) overlay.remove();
}

function openLLMPopup(charId, gearEl) {
  closeLLMPopup();
  const char = characters[charId];
  if (!char) return;

  // Position near the gear icon
  const rect = gearEl.getBoundingClientRect();

  // Overlay to close on click-outside
  const overlay = document.createElement('div');
  overlay.className = 'llm-popup-overlay';
  overlay.onclick = closeLLMPopup;
  document.body.appendChild(overlay);

  const popup = document.createElement('div');
  popup.className = 'llm-popup';

  const currentBackend = char.llm_backend || '';
  const currentModel = char.llm_model || '';
  const defLabel = `${defaultLLM.backend}/${defaultLLM.model || 'default'}`;

  let backendOptions = `<option value="">Session default (${esc(defLabel)})</option>`;
  for (const b of availableBackends) {
    const sel = b === currentBackend ? ' selected' : '';
    backendOptions += `<option value="${b}"${sel}>${b}</option>`;
  }

  popup.innerHTML = `
    <h3>${esc(char.short_name)} — LLM</h3>
    <label>Backend</label>
    <select id="llm-backend-sel">${backendOptions}</select>
    <div class="llm-default-note">Empty = use session default</div>
    <label>Model</label>
    <input id="llm-model-inp" type="text" value="${esc(currentModel)}"
           placeholder="e.g. claude-haiku-4-5-20251001, gpt-4o">
    <div class="llm-default-note">Leave blank for backend default</div>
    <div class="llm-popup-actions">
      <button class="llm-reset" onclick="setCharacterLLM('${charId}', '', '')">Reset</button>
      <button class="llm-apply" onclick="applyLLMPopup('${charId}')">Apply</button>
    </div>
  `;

  // Position: below gear, clamped to viewport
  popup.style.left = Math.min(rect.left, window.innerWidth - 300) + 'px';
  popup.style.top = (rect.bottom + 6) + 'px';
  document.body.appendChild(popup);
}

function applyLLMPopup(charId) {
  const backend = document.getElementById('llm-backend-sel').value;
  const model = document.getElementById('llm-model-inp').value.trim();
  setCharacterLLM(charId, backend, model);
  closeLLMPopup();
}

function setCharacterLLM(charId, backend, model) {
  closeLLMPopup();
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({
    type: 'set_character_llm',
    character_id: charId,
    backend: backend,
    model: model,
  }));
}

function updateLLMBadges() {
  for (const [cid, char] of Object.entries(characters)) {
    const el = document.querySelector(`.stage-char[data-id="${cid}"] .llm-badge`);
    if (el) {
      el.textContent = char.llm_backend
        ? `${char.llm_backend}/${char.llm_model || 'default'}`
        : '';
    }
  }
}

async function ingestPDF(hatId, file, el) {
  el.classList.add('ingesting');
  const char = characters[hatId];
  showToast(`Ingesting "${file.name}" for ${char ? char.short_name : hatId}...`, '#4080e8');
  const form = new FormData();
  form.append('file', file);
  form.append('hat_id', hatId);
  form.append('domain', '');
  try {
    const res = await fetch('/ingest', { method: 'POST', body: form });
    const data = await res.json();
    if (!data.success) showToast(`Ingest failed: ${data.error}`, '#e84040');
    // Success toast comes via WS ingest_complete broadcast
  } catch (err) {
    showToast(`Ingest error: ${err.message}`, '#e84040');
  } finally {
    el.classList.remove('ingesting');
  }
}

function playAudio(base64Audio, audioSeq) {
  // Stop any previously playing audio to prevent overlap
  if (currentAudio) {
    currentAudio.onended = null;
    currentAudio.onerror = null;
    currentAudio.pause();
    currentAudio = null;
  }

  function sendDone() {
    currentAudio = null;
    if (ws && ws.readyState === WebSocket.OPEN)
      ws.send(JSON.stringify({ type: 'audio_done', audio_seq: audioSeq || 0 }));
  }

  try {
    const audio = new Audio('data:audio/mp3;base64,' + base64Audio);
    currentAudio = audio;
    audio.onended = sendDone;
    audio.onerror = sendDone;
    audio.play().catch(sendDone);
  } catch (e) {
    console.warn('Audio playback failed:', e);
    sendDone();
  }
}

function esc(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

// ====================================================================
// Toasts
// ====================================================================
function showToast(message, color) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.style.borderLeftColor = color || '#e8a735';
  el.textContent = message;
  toastContainer.appendChild(el);
  setTimeout(() => el.remove(), 5000);
}

function showAffinityToast(change) {
  const el = document.createElement('div');
  el.className = 'toast';

  const arrow1 = change.c1_to_c2 > change.c1_to_c2_old ? 'toast-arrow-up' : 'toast-arrow-down';
  const arrow2 = change.c2_to_c1 > change.c2_to_c1_old ? 'toast-arrow-up' : 'toast-arrow-down';
  const sym1 = change.c1_to_c2 > change.c1_to_c2_old ? '\u25B2' : '\u25BC';
  const sym2 = change.c2_to_c1 > change.c2_to_c1_old ? '\u25B2' : '\u25BC';

  el.innerHTML = `
    <div class="toast-title">Affinity Shift</div>
    <div class="toast-pair">
      <span class="name">${esc(change.char1_name)}</span> \u2192 ${esc(change.char2_name)}:
      <span class="${arrow1}">${sym1} ${change.c1_to_c2.toFixed(3)}</span>
      <span class="toast-old">(was ${change.c1_to_c2_old.toFixed(3)})</span>
    </div>
    <div class="toast-pair">
      <span class="name">${esc(change.char2_name)}</span> \u2192 ${esc(change.char1_name)}:
      <span class="${arrow2}">${sym2} ${change.c2_to_c1.toFixed(3)}</span>
      <span class="toast-old">(was ${change.c2_to_c1_old.toFixed(3)})</span>
    </div>
    ${change.relationship ? `<div class="toast-relationship">${esc(change.relationship)}</div>` : ''}
  `;

  toastContainer.appendChild(el);
  // Auto-remove after animation completes (5s)
  setTimeout(() => el.remove(), 5000);
}

// ====================================================================
// Evolution toasts
// ====================================================================
function showEvolutionToast(msg) {
  const el = document.createElement('div');
  el.className = 'toast toast-evolution';
  const charName = msg.character_name || msg.character || 'Character';
  el.innerHTML = `
    <div class="toast-title">&#10024; New Behavior Evolved</div>
    <div class="toast-pair"><span class="name">${esc(charName)}</span></div>
    ${msg.content_preview ? `<div class="toast-relationship">${esc(msg.content_preview)}</div>` : ''}
  `;
  toastContainer.appendChild(el);
  setTimeout(() => el.remove(), 7000);
}

// ====================================================================
// Insight Panel
// ====================================================================
function toggleInsight() {
  insightOpen = !insightOpen;
  insightPanel.classList.toggle('collapsed', !insightOpen);
  insightBtn.classList.toggle('active', insightOpen);
}

function switchInsightTab(tab) {
  insightTab = tab;
  editingInstruction = null;
  document.getElementById('tab-retrieved').classList.toggle('active', tab === 'retrieved');
  document.getElementById('tab-editor').classList.toggle('active', tab === 'editor');
  if (tab === 'retrieved') {
    renderRetrievedPanel();
  } else {
    // Request full instruction list from server
    if (ws && ws.readyState === WebSocket.OPEN)
      ws.send(JSON.stringify({ type: 'get_instructions' }));
    insightBody.innerHTML = '<div class="insight-empty">Loading instructions&hellip;</div>';
  }
}

const TYPE_COLORS = {
  constraint: '#8b2040',
  persona: '#2a5090',
  protocol: '#1a6b3e',
  directive: '#8b6520',
  fallback: '#444',
};

function renderRetrievedPanel() {
  if (staticMode && !lastBearInstructions) {
    insightBody.innerHTML = '<div class="insight-empty" style="color:#e8a735">' +
      '\u26A0 Static Prompt Mode<br><br>' +
      '<span style="color:#666">The BEAR pipeline is bypassed.<br>' +
      'Characters use a generic prompt without<br>behavioral instructions, affinities, or scoped retrieval.</span></div>';
    return;
  }
  if (!lastBearInstructions || !lastBearCharacter) {
    insightBody.innerHTML = '<div class="insight-empty">Waiting for character response&hellip;<br>BEAR instructions will appear here.</div>';
    return;
  }

  const char = characters[lastBearCharacter];
  const charName = char ? char.short_name : lastBearCharacter;
  const charColor = char ? char.color : '#666';

  let contextTagsHtml = '';
  if (lastBearContextTags && lastBearContextTags.length > 1) {
    const tagLabels = lastBearContextTags.slice(1).map(t =>
      `<span class="instr-tag ctx-tag">${esc(t)}</span>`
    ).join('');
    contextTagsHtml = `<div class="insight-context-tags">Context: ${tagLabels}</div>`;
  }

  let html = `<div class="insight-char-label">
    <span class="insight-char-dot" style="background:${charColor}"></span>
    Retrieved for <strong>${esc(charName)}</strong> &middot; ${lastBearInstructions.length} instructions
  </div>${contextTagsHtml}`;

  for (const instr of lastBearInstructions) {
    const typeClass = TYPE_COLORS[instr.type] ? instr.type : 'fallback';
    const barColor = TYPE_COLORS[instr.type] || TYPE_COLORS.fallback;
    const barWidth = Math.round(Math.min(instr.final_score, 1.0) * 100);

    let tagsHtml = '';
    if (instr.tags && instr.tags.length > 0) {
      tagsHtml = '<div class="instr-tags">' +
        instr.tags.map(t => `<span class="instr-tag">${esc(t)}</span>`).join('') +
        '</div>';
    }

    html += `<div class="instr-card">
      <div class="instr-card-top">
        <span class="instr-type-badge ${typeClass}">${esc(instr.type)}</span>
        <span class="instr-id" title="${esc(instr.id)}">${esc(instr.id)}</span>
        <span class="instr-score">${instr.final_score.toFixed(3)}</span>
      </div>
      <div class="instr-bar-wrap">
        <div class="instr-bar" style="width:${barWidth}%;background:${barColor}"></div>
      </div>
      <div class="instr-content">${esc(instr.content_preview)}</div>
      ${tagsHtml}
    </div>`;
  }

  if (lastBearKnowledge && lastBearKnowledge.length > 0) {
    html += `<div class="insight-char-label" style="margin-top:12px;">
      Knowledge RAG &middot; ${lastBearKnowledge.length} chunks
    </div>`;
    for (const chunk of lastBearKnowledge) {
      html += `<div class="instr-card">
        <div class="instr-card-top">
          <span class="instr-type-badge" style="background:#1a6b3e;color:#e0e0e0;">knowledge</span>
        </div>
        <div class="instr-content">${esc(chunk)}</div>
      </div>`;
    }
  }

  insightBody.innerHTML = html;
}

// ====================================================================
// Instruction Editor
// ====================================================================
function renderEditorList() {
  if (!allInstructions.length) {
    insightBody.innerHTML = '<div class="insight-empty">No instructions loaded.</div>';
    return;
  }

  let html = `<div class="insight-char-label">${allInstructions.length} instructions</div>`;
  html += '<div class="editor-list">';

  for (const inst of allInstructions) {
    const typeClass = TYPE_COLORS[inst.type] ? inst.type : 'fallback';
    let tagsHtml = '';
    if (inst.tags && inst.tags.length > 0) {
      tagsHtml = '<div class="instr-tags">' +
        inst.tags.map(t => `<span class="instr-tag">${esc(t)}</span>`).join('') +
        '</div>';
    }

    html += `<div class="instr-card" onclick="editInstruction('${esc(inst.id)}')">
      <div class="instr-card-top">
        <span class="instr-type-badge ${typeClass}">${esc(inst.type)}</span>
        <span class="instr-id" title="${esc(inst.id)}">${esc(inst.id)}</span>
        <span class="instr-score">p${inst.priority}</span>
      </div>
      <div class="instr-content">${esc(inst.content.trim().substring(0, 80))}${inst.content.trim().length > 80 ? '\u2026' : ''}</div>
      ${tagsHtml}
    </div>`;
  }

  html += '</div>';
  insightBody.innerHTML = html;
}

function editInstruction(id) {
  const inst = allInstructions.find(i => i.id === id);
  if (!inst) return;
  editingInstruction = inst;

  const typeClass = TYPE_COLORS[inst.type] ? inst.type : 'fallback';
  insightBody.innerHTML = `
    <button class="editor-back" onclick="backToList()">\u2190 Back to list</button>
    <div class="instr-card-top" style="margin-bottom:10px">
      <span class="instr-type-badge ${typeClass}">${esc(inst.type)}</span>
      <span class="instr-id">${esc(inst.id)}</span>
    </div>
    <div class="editor-field">
      <label>Priority (0\u2013100)</label>
      <input type="number" id="edit-priority" min="0" max="100" value="${inst.priority}">
    </div>
    <div class="editor-field">
      <label>Content</label>
      <textarea id="edit-content">${esc(inst.content)}</textarea>
    </div>
    <div class="editor-field">
      <label>Tags (comma-separated)</label>
      <input type="text" id="edit-tags" value="${esc((inst.tags || []).join(', '))}">
    </div>
    <div style="display:flex;align-items:center">
      <button class="editor-save" id="edit-save-btn" onclick="saveInstruction()">Save</button>
      <span class="editor-status" id="edit-status"></span>
    </div>
  `;
}

function backToList() {
  editingInstruction = null;
  renderEditorList();
}

function saveInstruction() {
  if (!editingInstruction || !ws || ws.readyState !== WebSocket.OPEN) return;

  const content = document.getElementById('edit-content').value;
  const priority = parseInt(document.getElementById('edit-priority').value, 10);
  const tagsStr = document.getElementById('edit-tags').value;
  const tags = tagsStr.split(',').map(t => t.trim()).filter(t => t);

  const btn = document.getElementById('edit-save-btn');
  btn.disabled = true;

  ws.send(JSON.stringify({
    type: 'update_instruction',
    id: editingInstruction.id,
    content: content,
    priority: isNaN(priority) ? editingInstruction.priority : priority,
    tags: tags,
  }));
}

function handleInstructionUpdated(msg) {
  const statusEl = document.getElementById('edit-status');
  const btn = document.getElementById('edit-save-btn');
  if (btn) btn.disabled = false;

  if (statusEl) {
    if (msg.success) {
      statusEl.textContent = 'Saved!';
      statusEl.className = 'editor-status';
      // Update local copy
      if (editingInstruction) {
        const idx = allInstructions.findIndex(i => i.id === msg.id);
        if (idx !== -1) {
          const content = document.getElementById('edit-content')?.value || allInstructions[idx].content;
          const priority = parseInt(document.getElementById('edit-priority')?.value, 10);
          const tagsStr = document.getElementById('edit-tags')?.value || '';
          allInstructions[idx].content = content;
          if (!isNaN(priority)) allInstructions[idx].priority = priority;
          allInstructions[idx].tags = tagsStr.split(',').map(t => t.trim()).filter(t => t);
        }
      }
    } else {
      statusEl.textContent = msg.error || 'Error';
      statusEl.className = 'editor-status error';
    }
    statusEl.style.opacity = '1';
    setTimeout(() => { statusEl.style.opacity = '0'; }, 3000);
  }
}

// ====================================================================
// Start
// ====================================================================
connect();
chatInput.focus();
</script>
