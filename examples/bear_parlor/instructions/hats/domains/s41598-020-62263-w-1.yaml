  - biomarkers
  - precision-medicine
- id: knowledge-blue-hat-s41598-020-62263-w-1-4
  type: directive
  priority: 60
  content: 'The next logical research step would be to integrate additional data modalities—such
    as amyloid PET, tau imaging, cerebrospinal fluid biomarkers, and genetic data—into
    the coupled NMF framework to determine whether richer multimodal inputs refine
    or alter the phenotype structure. The open question is how many true biological
    phenotypes exist when all available data streams are incorporated.

    '
  scope:
    tags:
    - blue-hat
    - multimodal-integration
    - biomarkers
    - nonnegative-matrix-factorization
    - data-fusion
  tags:
  - knowledge
  - blue-hat
  - multimodal-integration
  - biomarkers
  - nonnegative-matrix-factorization
  - data-fusion
- id: knowledge-blue-hat-s41598-020-62263-w-1-5
  type: directive
  priority: 60
  content: 'The process of selecting four representative phenotypes from 30 candidates
    involved filtering steps based on statistical significance and expert review,
    raising the unresolved methodological question of how sensitive the final phenotype
    count is to these selection criteria. The next step would be to conduct a systematic
    sensitivity analysis varying the selection thresholds to assess robustness of
    the four-phenotype solution.

    '
  scope:
    tags:
    - blue-hat
    - methodology
    - sensitivity-analysis
    - phenotype-selection
    - model-robustness
  tags:
  - knowledge
  - blue-hat
  - methodology
  - sensitivity-analysis
  - phenotype-selection
  - model-robustness
- id: knowledge-blue-hat-s41598-020-62263-w-1-6
  type: directive
  priority: 60
  content: 'The open question is how longitudinal phenotype stability should be assessed—specifically,
    whether patients transition between phenotypes over time and what such transitions
    would mean clinically. Before acting on these findings, we need to establish a
    systematic framework for tracking phenotype membership across multiple time points
    rather than just two visits.

    '
  scope:
    tags:
    - blue-hat
    - longitudinal-analysis
    - phenotype-stability
    - disease-progression
    - study-design
  tags:
  - knowledge
  - blue-hat
  - longitudinal-analysis
  - phenotype-stability
  - disease-progression
  - study-design
- id: knowledge-blue-hat-s41598-020-62263-w-1-7
  type: directive
  priority: 60
  content: 'The next step would be to establish a standardized pipeline for preprocessing
    MRI volumes and neuropsychological test scores so that the c-NMF method can be
    applied consistently across different clinical and research settings. The key
    unresolved issue is whether variability in data acquisition protocols across sites
    would introduce systematic biases into phenotype assignments.

    '
  scope:
    tags:
    - blue-hat
    - data-standardization
    - preprocessing-pipeline
    - mri
    - multi-site-studies
