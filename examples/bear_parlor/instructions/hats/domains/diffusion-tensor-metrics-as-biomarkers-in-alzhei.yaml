- id: knowledge-white-hat-diffusion-tensor-metrics-as-biomarkers-in-alzhei-6
  type: directive
  priority: 60
  content: 'The longitudinal cognitive data revealed that memory was the most impaired
    cognitive domain at baseline, followed by statistical trends toward fluency and
    attention/orientation deficits over 12 months, while language and visuospatial
    abilities remained relatively preserved. The 16-patient longitudinal cohort showed
    significant decline in ACE-R scores from baseline (77.5±7.3) to 12 months (70.3±13.6).

    '
  scope:
    tags:
