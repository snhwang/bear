- id: knowledge-white-hat-diffusion-tensor-metrics-as-biomarkers-in-alzhei-3
  type: directive
  priority: 60
  content: 'Studies have found that progressive abnormalities in radial diffusivity
    and fractional anisotropy consistently occurred in brain areas that had first
    shown increases in axial and mean diffusivity. This sequential pattern suggests
    that increased axial diffusivity represents an upstream event preceding neuronal
    loss, as the latter two metrics correlate with dementia severity while the former
    do not.

    '
