instructions:
- id: knowledge-white-hat-diffusion-tensor-metrics-as-biomarkers-in-alzhei-1
  type: directive
  priority: 60
  content: 'Research shows that increased axial diffusivity and mean diffusivity are
    the earliest detectable abnormalities in Alzheimer''s disease, first appearing
    in mesial parietal and splenial white matter regions. These metrics remained relatively
    static with advancing disease, indicating they function as ''state-specific''
    markers suitable for early detection rather than disease progression monitoring.

    '
  scope:
    tags:
