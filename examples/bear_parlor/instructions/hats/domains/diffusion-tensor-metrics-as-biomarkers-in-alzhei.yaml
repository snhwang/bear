- id: knowledge-white-hat-diffusion-tensor-metrics-as-biomarkers-in-alzhei-2
  type: directive
  priority: 60
  content: 'The data indicates that increased radial diffusivity and decreased fractional
    anisotropy emerge later in disease progression but become increasingly abnormal
    as Alzheimer''s disease advances. In the splenium of the corpus callosum, these
    metrics correlated significantly with dementia severity, making them ''stage-specific''
    markers ideal for monitoring disease progression.

    '
  scope:
    tags:
