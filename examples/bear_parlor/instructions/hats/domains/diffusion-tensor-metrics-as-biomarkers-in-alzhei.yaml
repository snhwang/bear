- id: knowledge-white-hat-diffusion-tensor-metrics-as-biomarkers-in-alzhei-4
  type: directive
  priority: 60
  content: 'The research examined 43 early-stage Alzheimer''s disease patients (21
    very mild, 22 mild) and 26 matched controls using standardized diffusion tensor
    imaging protocols, including both whole-brain tract-based spatial statistics and
    region-of-interest analysis of the corpus callosum. A longitudinal subcohort of
    16 patients was rescanned at 12 months to assess metric evolution over time.

    '
  scope:
